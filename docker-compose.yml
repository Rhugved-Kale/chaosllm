services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      BUDGET_DAILY_USD: ${BUDGET_DAILY_USD:-}
      DASHBOARD_ORIGIN: ${DASHBOARD_ORIGIN:-}
    volumes:
      - ./proxy.yaml:/app/proxy.yaml:ro

  demo-app:
    build:
      context: ./demo
      dockerfile: Dockerfile
    ports:
      - "8100:8100"
    environment:
      PROXY_BASE_URL: http://proxy:8000
      RESILIENT: ${RESILIENT:-false}
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-mini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-haiku-4-5}
    depends_on:
      - proxy

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      VITE_PROXY_URL: ${VITE_PROXY_URL:-http://localhost:8000}
    depends_on:
      - proxy
